version: "3.8"

services:
  nginx:
    image: nginx:stable
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html/lovable:ro
      - ./meetingmind-ai-final/meetingmind-frontend/dist/public:/usr/share/nginx/html/meetingmind:ro
    depends_on:
      - meetingmind-backend

  meetingmind-backend:
    build:
      context: ./meetingmind-ai-final/meetingmind-frontend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - BUILT_IN_FORGE_API_KEY=${BUILT_IN_FORGE_API_KEY}
      - BUILT_IN_FORGE_API_URL=${BUILT_IN_FORGE_API_URL}
      - VITE_APP_ID=${VITE_APP_ID}
      - OAUTH_SERVER_URL=${OAUTH_SERVER_URL}
      - VITE_OAUTH_PORTAL_URL=${VITE_OAUTH_PORTAL_URL}
    ports:
      - "3000:3000"
    depends_on:
      - mysql

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-meetingmind}
      - MYSQL_USER=${MYSQL_USER:-meetingmind}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-meetingmind}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # Optional: local dev servers with hot reload
  lovable-dev:
    working_dir: /app
    image: node:22-alpine
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 4173"
    volumes:
      - ./:/app
    ports:
      - "4173:4173"
    environment:
      - NODE_ENV=development

  meetingmind-dev:
    working_dir: /app
    image: node:22-alpine
    command: sh -c "npm install -g pnpm && pnpm install && pnpm dev"
    volumes:
      - ./meetingmind-ai-final/meetingmind-frontend:/app
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development

volumes:
  mysql_data:

