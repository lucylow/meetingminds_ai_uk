worker_processes auto;
events { worker_connections 1024; }

http {
  sendfile on;
  tcp_nopush on;

  upstream meetingmind_backend {
    server meetingmind-backend:3000;
  }

  server {
    listen 80;
    server_name _;

    # Lovable landing page (root Vite app)
    location /lovable/ {
      alias /usr/share/nginx/html/lovable/;
      try_files $uri $uri/ /index.html;
    }

    # MeetingMind landing page (static build from meetingmind-frontend)
    location /meetingmind/ {
      alias /usr/share/nginx/html/meetingmind/;
      try_files $uri $uri/ /index.html;
    }

    # API proxy to MeetingMind backend
    location /api/ {
      proxy_pass http://meetingmind_backend/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}

